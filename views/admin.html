<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 20px;
}
h2{
    text-align: center;
}
.container {
    max-width: 1000px;
    margin: auto;
}
.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 10px;
    border: 1px solid #ddd;
    text-align: center;
}
th {
    background: #d435dc;
    color: white;
}

button {
    background: #dc3545;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    float: right;
    margin-bottom: 10px;
    font-weight: bold;
    transition: 0.3s ease;
}

button:hover {
    background: #c82333;
    transform: scale(1.05);
}

button:active {
    transform: scale(0.95);
}
</style>
</head>

<body>
   

<div class="container">
    <div class="card">
        <button onClick="logout()">Logout</button>
        <h2>Admin Dashboard</h2>

        <div class="emty">Empty List !</div>
        <table id="cont">
           
        </table>
    </div>
</div>


<script>
   function getAllUsers() {
    fetch("/user/getUser") // your admin API
    .then(res => res.json())
    .then(data => {
        console.log("Users:", data);

        const table = document.getElementById("cont");
        const emptyMsg = document.getElementsByClassName("emty")[0];

        // Reset table
        table.innerHTML = `
            <tr>
                <th>Sr.no</th>
                <th>Name</th>
                <th>Email</th>
            </tr>
        `;

        if (data.sucess) {

            if (data.users.length === 0) {
                emptyMsg.style.display = "block";
                table.style.display = "none";
            } else {
                emptyMsg.style.display = "none";
                table.style.display = "table";

                data.users.forEach((user, index) => {
                    const row = document.createElement("tr");

                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${user.Name}</td>
                        <td>${user.Email}</td>
                    `;

                    table.appendChild(row);
                });
            }

        } else {
            alert("Failed to fetch users");
        }
    });
}

getAllUsers();

async function logout()
{
    const res = await fetch("/user/logout");
    window.location.href = "/login.html"
}

</script>
</body>
</html>
