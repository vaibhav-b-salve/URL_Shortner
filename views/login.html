<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }

        .login-btn {
            background: #28a745;
        }

        .guest {
            background: #6c757d;
        }

        .admin {
            background: #dc3545;
        }

        .guest {
            background: #007bff;
        }

        button:hover {
            opacity: 0.9;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Login</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>

        <button class="login-btn" type="submit">Login</button>

        <a href="/guest.html"><button type="button" class="guest">Login as Guest</button></a>
    </form>

    <div class="link">
        <a href="register.html">Create Account</a>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    fetch("/user/login", {  
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {
        console.log("data : ",data);
       if(data.success)
       {
        alert("login successfully: "+data.role);
        if(data.role=="admin")
       {
        window.location.href = "/admin.html";
       }else{
        window.location.href = "/user.html";
       }
       }else{
        alert(data.message);
       }
    })
    .catch(err => {
        console.error(err);
        alert("Something went wrong!");
    });
});
</script>
</body>
</html>
